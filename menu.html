<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Profile</title>
    <style>
        /* 1. Reset and base styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body {
            background-color: #060606;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 2. The Glass Card */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 320px;
            text-align: center;
        }

        /* 3. Avatar Placeholder */
        .avatar {
            width: 90px;
            height: 90px;
            background: #1a1a1a;
            border-radius: 20px;
            margin: 0 auto 20px;
            border: 1px solid #333;
        }

        /* 4. Text Styles */
        h1 { font-size: 1.25rem; margin-bottom: 4px; }
        p { color: #666; font-size: 0.875rem; margin-bottom: 30px; }

        /* 5. Links styling */
        .link-group { display: flex; flex-direction: column; gap: 12px; }
        
        .link-btn {
            display: block;
            padding: 16px;
            background: #0f0f0f;
            border: 1px solid #1a1a1a;
            color: white;
            text-decoration: none;
            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .link-btn:hover {
            background: #1a1a1a;
            border-color: #333;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="avatar"></div>
        <h1>Your Name</h1>
        <p>@yourhandle</p>

        <div class="link-group">
            <a href="#" class="link-btn">Discord</a>
            <a href="#" class="link-btn">GitHub</a>
            <a href="#" class="link-btn">Portfolio</a>
        </div>
    </div>

</body>
</html>
