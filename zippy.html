<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drift | @frosty</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    color: #fff;
  }

  /* ── PRELOAD SCREEN ── */
  #preload {
    position: fixed; inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    cursor: pointer;
    transition: opacity 0.8s ease;
  }
  #preload.fade-out { opacity: 0; pointer-events: none; }
  #preload-text {
    color: #fff;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

  /* ── BACKGROUND ── */
  #bg {
    position: fixed; inset: 0; z-index: 0;
    background: url('https://i.imgur.com/Q9kF3gk.jpeg') center/cover no-repeat;
    filter: brightness(0.35);
  }
  /* dark overlay */
  #overlay {
    position: fixed; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
  }

  /* ── RAIN CANVAS ── */
  #rain-canvas {
    position: fixed; inset: 0; z-index: 2;
    pointer-events: none;
  }

  /* ── VOLUME BUTTON ── */
  #vol-btn {
    position: fixed; top: 12px; left: 12px; z-index: 100;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 8px 10px;
    cursor: pointer;
    font-size: 1.1rem;
    backdrop-filter: blur(6px);
    transition: background 0.2s;
    color: #fff;
  }
  #vol-btn:hover { background: rgba(255,255,255,0.25); }

  /* ── AK GUNS ── */
  #ak-left, #ak-right {
    position: fixed; bottom: 0; z-index: 50;
    width: 280px;
    pointer-events: none;
    filter: drop-shadow(0 0 8px rgba(255,120,0,0));
    transition: filter 0.05s;
  }
  #ak-left  { left: -80px;  transform: rotate(42deg);  transform-origin: bottom left; }
  #ak-right { right: -80px; transform: rotate(-42deg); transform-origin: bottom right; }
  #ak-left img, #ak-right img { width: 100%; }
  #ak-right img { transform: scaleX(-1); }

  /* muzzle flash */
  .flash {
    position: absolute;
    width: 60px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.06s;
  }
  #flash-left  { top: 10px; left: -10px; }
  #flash-right { top: 10px; right: -10px; transform: scaleX(-1); }

  /* ── MAIN CARD ── */
  #bio-page {
    position: fixed; inset: 0; z-index: 60;
    display: none;
    align-items: center;
    justify-content: center;
    overflow-y: auto;
    padding: 20px;
  }
  #bio-page.visible { display: flex; }

  #card {
    width: 100%;
    max-width: 480px;
    border-radius: 16px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    overflow: hidden;
    position: relative;
  }

  /* banner */
  #banner {
    width: 100%;
    height: 120px;
    background: url('https://i.imgur.com/ot9Titb.png') center/cover no-repeat, 
                linear-gradient(135deg, #1a0030 0%, #0a0015 100%);
    background-blend-mode: overlay;
    position: relative;
  }

  /* avatar */
  #avatar-wrap {
    position: absolute;
    bottom: -28px;
    left: 20px;
  }
  #avatar {
    width: 62px; height: 62px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.3);
    background: #222;
    object-fit: cover;
  }

  /* profile info */
  #profile-info {
    padding: 40px 20px 16px;
  }
  #username {
    font-size: 1.4rem;
    font-weight: 700;
    background: linear-gradient(90deg, #fff 0%, #a78bfa 50%, #fff 100%);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s linear infinite;
    display: inline-block;
  }
  @keyframes shine {
    0%   { background-position: 0% }
    100% { background-position: 200% }
  }
  #bio-desc {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.55);
    margin-top: 4px;
  }

  /* ── MUSIC BAR ── */
  #music-bar {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    gap: 10px;
    overflow: hidden;
  }
  .music-icon { font-size: 1.1rem; flex-shrink: 0; }
  #marquee-track {
    overflow: hidden;
    flex: 1;
    mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
  }
  #marquee-inner {
    display: inline-flex;
    white-space: nowrap;
    gap: 12px;
    font-size: 0.82rem;
    color: rgba(255,255,255,0.75);
    animation: marquee 14s linear infinite;
  }
  #marquee-inner span.dot { color: rgba(255,255,255,0.3); }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* ── SOCIAL LINKS ── */
  #links {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .link-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 50px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.09);
    color: #fff;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    transition: background 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .link-btn:hover {
    background: rgba(255,255,255,0.14);
    transform: translateX(3px);
  }
  .link-icon { font-size: 1rem; width: 22px; text-align: center; }

  /* ── VIEWS ── */
  #views-row {
    padding: 10px 16px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>

<!-- BG -->
<div id="bg"></div>
<div id="overlay"></div>
<canvas id="rain-canvas"></canvas>

<!-- PRELOAD -->
<div id="preload" onclick="enterSite()">
  <div id="preload-text">tap to enter</div>
</div>

<!-- VOLUME -->
<button id="vol-btn" onclick="toggleMute()">🔊</button>

<!-- AK GUNS -->
<div id="ak-left">
  <img src="https://i.imgur.com/ot9Titb.png" alt="AK">
  <img class="flash" id="flash-left" src="https://i.imgur.com/YCy6LgZ.png" alt="">
</div>
<div id="ak-right">
  <img src="https://i.imgur.com/ot9Titb.png" alt="AK">
  <img class="flash" id="flash-right" src="https://i.imgur.com/YCy6LgZ.png" alt="">
</div>

<!-- AUDIO -->
<audio id="bgm" loop preload="none">
  <source src="https://files.catbox.moe/eatkyw.mp3" type="audio/mpeg">
</audio>
<audio id="rain-sfx" loop autoplay>
  <source src="YOUR_RAIN_SOUND.mp3" type="audio/mpeg">
</audio>

<!-- BIO PAGE -->
<div id="bio-page">
  <div id="card">

    <!-- Banner -->
    <div id="banner">
      <div id="avatar-wrap">
        <img id="avatar" src="NaN" alt="avatar">
      </div>
    </div>

    <!-- Profile -->
    <div id="profile-info">
      <div id="username">Frosty</div>
      <div id="bio-desc">living in the drift ✦</div>
    </div>

    <!-- Music -->
    <div id="music-bar">
      <span class="music-icon">🎵</span>
      <div id="marquee-track">
        <div id="marquee-inner">
          <span>Californication - Juice Wrld</span>
          <span class="dot">·</span>
          <span>Californication - Juice Wrld</span>
          <span class="dot">·</span>
          <span>Californication - Juice Wrld</span>
          <span class="dot">·</span>
          <span>Californication - Juice Wrld</span>
          <span class="dot">·</span>
          <span>Californication - Juice Wrld</span>
          <span class="dot">·</span>
        </div>
      </div>
    </div>

    <!-- Links -->
    <div id="links">
      <a class="link-btn" href="#" target="_blank">
        <span class="link-icon">💬</span> Discord
      </a>
      <a class="link-btn" href="#" target="_blank">
        <span class="link-icon">🐦</span> Twitter / X
      </a>
      <a class="link-btn" href="#" target="_blank">
        <span class="link-icon">📷</span> Instagram
      </a>
      <a class="link-btn" href="#" target="_blank">
        <span class="link-icon">🎮</span> Steam
      </a>
    </div>

    <!-- Views -->
    <div id="views-row">
      👁 <span>7 views</span>
    </div>

  </div>
</div>

<script>
// ── RAIN ──
const canvas = document.getElementById('rain-canvas');
const ctx = canvas.getContext('2d');
let drops = [];
let rainIntensity = 1;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function initDrops(count) {
  drops = [];
  for (let i = 0; i < count; i++) {
    drops.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      length: Math.random() * 18 + 8,
      speed: Math.random() * 3 + 2,
      opacity: Math.random() * 0.4 + 0.1
    });
  }
}
initDrops(120);

function drawRain() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drops.forEach(d => {
    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(d.x - d.length * 0.2, d.y + d.length);
    ctx.strokeStyle = `rgba(180,200,255,${d.opacity * rainIntensity})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
    d.y += d.speed * rainIntensity;
    d.x -= d.speed * 0.2;
    if (d.y > canvas.height || d.x < 0) {
      d.y = -d.length;
      d.x = Math.random() * canvas.width;
    }
  });
  requestAnimationFrame(drawRain);
}
drawRain();

// ── GUN FIRE ──
let gunInterval = null;

function fireGuns() {
  const flashL = document.getElementById('flash-left');
  const flashR = document.getElementById('flash-right');
  const akL = document.getElementById('ak-left');
  const akR = document.getElementById('ak-right');

  function shoot() {
    flashL.style.opacity = 1;
    flashR.style.opacity = 1;
    akL.style.filter = 'drop-shadow(0 0 12px orange)';
    akR.style.filter = 'drop-shadow(0 0 12px orange)';
    rainIntensity = 2.5;
    setTimeout(() => {
      flashL.style.opacity = 0;
      flashR.style.opacity = 0;
      akL.style.filter = '';
      akR.style.filter = '';
      rainIntensity = 1;
    }, 80);
  }

  // random fire rhythm
  function scheduleNext() {
    const delay = Math.random() * 400 + 200;
    gunInterval = setTimeout(() => {
      shoot();
      scheduleNext();
    }, delay);
  }
  scheduleNext();
}

// ── AUDIO ──
const bgm = document.getElementById('bgm');
let muted = false;

function toggleMute() {
  muted = !muted;
  bgm.muted = muted;
  document.getElementById('vol-btn').textContent = muted ? '🔇' : '🔊';
}

// ── ENTER ──
function enterSite() {
  const pre = document.getElementById('preload');
  pre.classList.add('fade-out');

  // load and play immediately on click
  bgm.load();
  bgm.volume = 0.8;
  bgm.play();

  setTimeout(() => {
    pre.style.display = 'none';
    document.getElementById('bio-page').classList.add('visible');
    fireGuns();
  }, 800);
}

// keyboard enter too
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') enterSite();
});
</script>
</body>
</html>
