<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drift.rip | @zippy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    color: #fff;
  }

  /* ── BACKGROUND VIDEO ── */
  #video-background {
    position: fixed; inset: 0; z-index: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(0.45);
    pointer-events: none;
  }

  /* ── OVERLAY ── */
  #overlay {
    position: fixed; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }

  /* ── RAIN ── */
  #rain-canvas {
    position: fixed; inset: 0; z-index: 2;
    pointer-events: none;
  }

  /* ── PRELOAD ── */
  #preload-screen {
    position: fixed; inset: 0; z-index: 500;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.8s ease;
  }
  #preload-screen.fade-out { opacity: 0; pointer-events: none; }
  #bio-startText {
    color: #fff;
    font-size: 1.2rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

  /* ── BIO PAGE ── */
  #bio-page {
    position: fixed; inset: 0; z-index: 60;
    display: none;
    align-items: center;
    justify-content: center;
    overflow-y: auto;
    padding: 20px;
  }
  #bio-page.visible { display: flex; }

  /* ── AK GUNS ── */
  #ak-container {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 50;
    pointer-events: none;
    display: none;
  }
  #ak-container.visible { display: flex; }

  #ak-left {
    position: absolute;
    bottom: 0;
    left: -80px;
    width: 300px;
    transform: rotate(42deg);
    transform-origin: bottom left;
  }
  #ak-right {
    position: absolute;
    bottom: 0;
    right: -80px;
    width: 300px;
    transform: rotate(-42deg);
    transform-origin: bottom right;
  }
  #ak-left img.ak-img { width: 300px; height: auto; transform: scaleX(-1); }
  #ak-right img.ak-img { width: 300px; height: auto; }

  #flash-left, #flash-right {
    position: absolute;
    top: 10px;
    width: 80px;
    height: auto;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.06s;
  }
  #flash-left { left: -10px; transform: scaleX(-1); }
  #flash-right { right: -10px; }

  /* ── CARD ── */
  #bio-content {
    width: 100%;
    max-width: 480px;
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    overflow: hidden;
    position: relative;
    z-index: 60;
  }

  /* ── BANNER ── */
  .bio-banner-background {
    width: 100%;
    min-height: 90px;
    background-image: url('https://drift.rip/media/users/banners/banner_2530_6a31d0e7dad4e3.73295956.webp');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    border-radius: 0.375rem;
    padding: 20px;
    display: flex;
    align-items: flex-start;
    position: relative;
    margin-bottom: 10px;
  }

  /* ── AVATAR ── */
  .avatars-uwu {
    position: relative;
    width: 80px; height: 80px;
    flex-shrink: 0;
  }
  .avatars-uwu img.avatar-img {
    width: 80px; height: 80px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
  }
  .avatars-uwu img.avatar-frame {
    position: absolute;
    top: 0; left: 0;
    width: 80px; height: 80px;
    transform: scale(1.2);
    pointer-events: none;
  }

  /* ── PROFILE INFO ── */
  #main-profile-content {
    padding: 8px 24px 20px;
  }

  .profile-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 10px;
  }

  #bio-username {
    font-size: 1.5rem;
    font-weight: 600;
    background: linear-gradient(to right, #0f0f0f 0%, #8b5cf6 50%, #0f0f0f 70%);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s linear infinite;
    display: inline-block;
  }
  @keyframes shine { 0%{background-position:0%} 100%{background-position:200%} }

  /* ── MUSIC MARQUEE ── */
  .music-bar {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 8px;
  }
  .music-icon { font-size: 1.1rem; flex-shrink: 0; }
  .marquee-track {
    overflow: hidden;
    flex: 1;
    mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
  }
  .marquee {
    display: inline-flex;
    white-space: nowrap;
    gap: 10px;
    font-size: 0.85rem;
    color: #fff;
    animation: marquee 12s linear infinite;
    min-width: max-content;
  }
  @keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }

  /* ── CARDS SECTION ── */
  #profile-cards-section {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
    margin-bottom: 12px;
  }
  @media (min-width: 500px) {
    #profile-cards-section { grid-template-columns: 1fr 1fr; }
  }

  /* ── MODULE CARDS ── */
  .module-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 50px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.06);
    color: #fff;
    text-decoration: none;
    font-size: 0.82rem;
    transition: background 0.2s, transform 0.15s;
    cursor: pointer;
    width: 100%;
  }
  .module-card:hover {
    background: rgba(255,255,255,0.14);
    transform: translateX(3px);
  }
  .module-card-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 1.1rem;
  }
  .module-card-icon img {
    width: 44px; height: 44px;
    border-radius: 50%;
    object-fit: cover;
  }
  .module-card-info { display: flex; flex-direction: column; min-width: 0; }
  .module-titleText {
    color: #fff;
    font-weight: 600;
    font-size: 0.85rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
  }
  .module-labelText {
    color: rgba(255,255,255,0.6);
    font-size: 0.72rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
  }

  .hdn {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }
</style>
</head>
<body>

<!-- BACKGROUND VIDEO -->
<video id="video-background" autoplay muted playsinline loop>
  <source src="ADD_YOUR_VIDEO_URL.mp4" type="video/mp4">
</video>
<div id="overlay"></div>
<canvas id="rain-canvas"></canvas>

<!-- AUDIO -->
<audio id="background-audio" loop preload="none">
  <source src="ADD_YOUR_AUDIO_URL.mp3" type="audio/mpeg">
</audio>

<!-- PRELOAD -->
<div id="preload-screen" onclick="enterSite()">
  <div id="bio-startText">Click to enter!</div>
</div>

<!-- AK GUNS -->
<div id="ak-container">
  <div id="ak-left">
    <img class="ak-img" src="https://i.imgur.com/ot9Titb.png" alt="AK-47">
    <img id="flash-left" src="https://i.imgur.com/YCy6LgZ.png" alt="">
  </div>
  <div id="ak-right">
    <img class="ak-img" src="https://i.imgur.com/ot9Titb.png" alt="AK-47">
    <img id="flash-right" src="https://i.imgur.com/YCy6LgZ.png" alt="">
  </div>
</div>

<!-- BIO PAGE -->
<div id="bio-page">
  <div id="bio-content">

    <!-- Banner + Avatar -->
    <div class="bio-banner-background">
      <div class="avatars-uwu">
        <img class="avatar-img" src="/media/users/avatars/avatar_2530_6a31d1febcaa31.98103322.webp"
          onerror="this.src='https://i.imgur.com/lBMRQsl.png'" alt="avatar">
        <img class="avatar-frame" src="https://drift.rip/media/content/decorations/drifter.webp"
          onerror="this.style.display='none'" alt="">
      </div>
    </div>

    <!-- Profile Info -->
    <div id="main-profile-content">
      <h2 id="bio-username">Frosty</h2>

      <!-- Music marquee -->
      <div class="music-bar">
        <span class="music-icon">🎵</span>
        <div class="marquee-track">
          <div class="marquee">
            <span>Californication - Juice Wrld</span>
            <span>·</span>
            <span>Californication - Juice Wrld</span>
            <span>·</span>
            <span>Californication - Juice Wrld</span>
            <span>·</span>
            <span>Californication - Juice Wrld</span>
            <span>·</span>
            <span>Californication - Juice Wrld</span>
            <span>·</span>
          </div>
        </div>
      </div>

      <!-- Cards -->
      <div id="profile-cards-section">
        <!-- Add your cards here -->
      </div>

    </div>
  </div>
</div>

<script>
// ── RAIN ──
const canvas = document.getElementById('rain-canvas');
const ctx = canvas.getContext('2d');
let drops = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function initDrops() {
  drops = [];
  for (let i = 0; i < 120; i++) {
    drops.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      length: Math.random() * 18 + 8,
      speed: Math.random() * 3 + 2,
      opacity: Math.random() * 0.1 + 0.03
    });
  }
}
initDrops();

function drawRain() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drops.forEach(d => {
    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(d.x - d.length * 0.2, d.y + d.length);
    ctx.strokeStyle = `rgba(180,200,255,${d.opacity})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
    d.y += d.speed;
    d.x -= d.speed * 0.2;
    if (d.y > canvas.height || d.x < 0) {
      d.y = -d.length;
      d.x = Math.random() * canvas.width;
    }
  });
  requestAnimationFrame(drawRain);
}
drawRain();

// ── GUN FIRE ──
function fireGuns() {
  const flashL = document.getElementById('flash-left');
  const flashR = document.getElementById('flash-right');
  const akL = document.getElementById('ak-left');
  const akR = document.getElementById('ak-right');

  function shoot() {
    flashL.style.opacity = 1;
    flashR.style.opacity = 1;
    akL.style.filter = 'drop-shadow(0 0 12px orange)';
    akR.style.filter = 'drop-shadow(0 0 12px orange)';
    setTimeout(() => {
      flashL.style.opacity = 0;
      flashR.style.opacity = 0;
      akL.style.filter = '';
      akR.style.filter = '';
    }, 80);
  }

  function scheduleNext() {
    const delay = Math.random() * 400 + 200;
    setTimeout(() => { shoot(); scheduleNext(); }, delay);
  }
  scheduleNext();
}

// ── AUDIO ──
const bgm = document.getElementById('background-audio');

// ── ZALGO TITLE ──
const originalTitle = document.title;
const zalgoChars = ['̒','̏','̓','̔','̄','̅','̋','̍','̎','̐','̑','̒','̀','́','͂','̓','̈́','ͅ','͆','͇','͈','͉','͊','͋'];
function generateZalgoTitle() {
  let t = '';
  for (let i = 0; i < originalTitle.length; i++) {
    t += originalTitle[i];
    const n = Math.floor(Math.random() * 5);
    for (let j = 0; j < n; j++) t += zalgoChars[Math.floor(Math.random() * zalgoChars.length)];
  }
  document.title = t;
  setTimeout(generateZalgoTitle, 100);
}

// ── ENTER ──
function enterSite() {
  const pre = document.getElementById('preload-screen');
  pre.classList.add('fade-out');
  bgm.load();
  bgm.volume = 0.8;
  bgm.play().catch(() => {});
  setTimeout(() => {
    pre.style.display = 'none';
    document.getElementById('bio-page').classList.add('visible');
    document.getElementById('ak-container').classList.add('visible');
    fireGuns();
    generateZalgoTitle();
  }, 800);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') enterSite();
});
</script>
</body>
</html>
