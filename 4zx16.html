<title>@vrarri</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    color: #fff;
  }

  /* ── BACKGROUND VIDEO ── */
  #video-background {
    position: fixed; inset: 0; z-index: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(0.5);
    pointer-events: none;
  }

  /* ── OVERLAY ── */
  #overlay {
    position: fixed; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }

  /* ── RAIN ── */
  #rain-canvas {
    position: fixed; inset: 0; z-index: 2;
    pointer-events: none;
  }

  /* ── PRELOAD ── */
  #preload-screen {
    position: fixed; inset: 0; z-index: 500;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.8s ease;
  }
  #preload-screen.fade-out { opacity: 0; pointer-events: none; }
  #bio-startText {
    color: #fff;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

  /* ── VOLUME ── */
  #volume-control {
    position: fixed; top: 12px; left: 12px; z-index: 100;
    display: flex; align-items: center;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 6px 10px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    gap: 6px;
    transition: width 0.3s;
    overflow: hidden;
    width: 44px;
  }
  #volume-control:hover { width: 160px; }
  #volume-icon { font-size: 1.2rem; flex-shrink: 0; cursor: pointer; }
  #volume-slider {
    width: 100px;
    accent-color: #fff;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #volume-control:hover #volume-slider { opacity: 1; }

  /* ── BIO PAGE ── */
  #bio-page {
    position: fixed; inset: 0; z-index: 60;
    display: none;
    align-items: center;
    justify-content: center;
    overflow-y: auto;
    padding: 20px;
  }
  #bio-page.visible { display: flex; }

  /* ── CARD ── */
  #bio-content {
    width: 100%;
    max-width: 420px;
    border-radius: 24px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    overflow: hidden;
    position: relative;
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  /* ── BANNER ── */
  .bio-banner-background {
    width: 100%;
    height: 110px;
    background-image: url('https://drift.rip/media/users/banners/banner_4980_6a31dd487bf1a9.11199859.webp');
    background-size: 100%;
    background-position: center;
    background-repeat: no-repeat;
    position: relative;
    padding: 20px;
    display: flex;
    align-items: flex-start;
  }

  /* ── AVATAR ── */
  .avatars-uwu {
    position: absolute;
    bottom: -28px;
    left: 20px;
    width: 64px; height: 64px;
  }
  .avatars-uwu img {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    object-fit: cover;
  }

  /* ── PROFILE INFO ── */
  #main-profile-content {
    padding: 10px 20px 16px;
  }
  .profile-top {
    padding-top: 36px;
  }
  #bio-username {
    font-size: 1.4rem;
    font-weight: 700;
    background: linear-gradient(to right, #ea3030 0%, #ec4899 50%, #ea3030 70%);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s linear infinite;
    display: inline-block;
  }
  @keyframes shine { 0%{background-position:0%} 100%{background-position:200%} }

  #bio-description {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.65);
    margin-top: 2px;
  }
  #bio-label {
    font-size: 0.72rem;
    color: #ec4899;
    opacity: 0.8;
    margin-top: 2px;
  }

  /* ── CARDS SECTION ── */
  #profile-cards-section {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
    margin: 12px 0;
  }
  @media (min-width: 500px) {
    #profile-cards-section { grid-template-columns: 1fr 1fr; }
  }

  /* ── MODULE CARDS ── */
  .module-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 50px;
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.07);
    color: #b3b3b3;
    text-decoration: none;
    font-size: 0.82rem;
    transition: background 0.2s, transform 0.15s;
    cursor: pointer;
    width: 100%;
  }
  .module-card:hover {
    background: rgba(255,255,255,0.08);
    transform: translateX(3px);
  }
  .module-card-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 1.2rem;
  }
  .module-card-icon img {
    width: 44px; height: 44px;
    border-radius: 50%;
    object-fit: cover;
  }
  .module-card-info { display: flex; flex-direction: column; min-width: 0; }
  .module-titleText {
    color: #b3b3b3;
    font-weight: 600;
    font-size: 0.85rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
  }
  .module-labelText {
    color: #888;
    font-size: 0.72rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
  }

  /* ── CONNECTIONS (icon row) ── */
  #section-profile-connections {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    align-items: center;
    margin: 10px 0 6px;
  }
  .bio-media-icon {
    color: #fff;
    font-size: 1.2rem;
    text-decoration: none;
    transition: transform 0.2s, filter 0.2s;
    filter: drop-shadow(0 0 5px #fff) drop-shadow(0 0 10px #fff);
  }
  .bio-media-icon:hover { transform: scale(1.2); }
  .bio-media-icon svg { width: 1.2em; height: 1.2em; fill: currentColor; }

  /* ── VIEWS ROW ── */
  #views-row {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.4);
    padding: 6px 0 2px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── TYPEWRITER ── */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .cursor {
    display: inline-block;
    width: 2px; height: 1em;
    background: rgba(255,255,255,0.6);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
  }

  /* ── HIDDEN ── */
  .hdn {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }
</style>

<script>
// ── RAIN ──
const canvas = document.getElementById('rain-canvas');
const ctx = canvas.getContext('2d');
let drops = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function initDrops() {
  drops = [];
  for (let i = 0; i < 120; i++) {
    drops.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      length: Math.random() * 18 + 8,
      speed: Math.random() * 3 + 2,
      opacity: Math.random() * 0.12 + 0.04
    });
  }
}
initDrops();

function drawRain() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drops.forEach(d => {
    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(d.x - d.length * 0.2, d.y + d.length);
    ctx.strokeStyle = `rgba(180,200,255,${d.opacity})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
    d.y += d.speed;
    d.x -= d.speed * 0.2;
    if (d.y > canvas.height || d.x < 0) {
      d.y = -d.length;
      d.x = Math.random() * canvas.width;
    }
  });
  requestAnimationFrame(drawRain);
}
drawRain();

// ── TYPEWRITER ──
const descEl = document.getElementById('bio-description');
const text = "idk bored";
let i = 0;
function typewriter() {
  if (i <= text.length) {
    descEl.textContent = text.slice(0, i);
    i++;
    setTimeout(typewriter, 80);
  }
}

// ── CARD TILT ──
const card = document.getElementById('bio-content');
const maxTilt = 8;
card.addEventListener('mousemove', e => {
  const rect = card.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const rotY = ((x / rect.width) - 0.5) * 2 * maxTilt;
  const rotX = -(((y / rect.height) - 0.5) * 2 * maxTilt);
  card.style.transform = `perspective(1000px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.03)`;
});
card.addEventListener('mouseleave', () => {
  card.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale(1)`;
});

// ── AUDIO ──
const bgm = document.getElementById('background-audio');
let muted = false;

function toggleMute() {
  muted = !muted;
  bgm.muted = muted;
  document.getElementById('volume-icon').textContent = muted ? '🔇' : '🔊';
}
function setVolume(v) {
  bgm.volume = v;
  if (v == 0) {
    muted = true;
    document.getElementById('volume-icon').textContent = '🔇';
  } else {
    muted = false;
    bgm.muted = false;
    document.getElementById('volume-icon').textContent = '🔊';
  }
}

// ── ENTER ──
function enterSite() {
  const pre = document.getElementById('preload-screen');
  pre.classList.add('fade-out');
  bgm.load();
  bgm.volume = 0.8;
  bgm.play().catch(() => {});
  setTimeout(() => {
    pre.style.display = 'none';
    document.getElementById('bio-page').classList.add('visible');
    typewriter();
  }, 800);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') enterSite();
});

// ── TITLE TYPEWRITER ──
const originalTitle = document.title;
let tIdx = 1, typing = true;
function typeTitle() {
  document.title = originalTitle.substring(0, tIdx);
  if (typing) {
    tIdx++;
    if (tIdx > originalTitle.length) { typing = false; setTimeout(typeTitle, 2000); return; }
  } else {
    tIdx--;
    if (tIdx < 1) typing = true;
  }
  setTimeout(typeTitle, 150);
}
typeTitle();
</script>
